<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="CSS/admin.css">

</head>

<body>

<div class="d-flex">

    <!-- 🔥 SIDEBAR -->
    <div class="sidebar p-3">
        <h4 class="text-white">Admin</h4>

        <a href="#" class="nav-link active"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="#" class="nav-link"><i class="bi bi-people"></i> Users</a>
        <a href="#" class="nav-link"><i class="bi bi-gear"></i> Settings</a>
    </div>

    <!-- 🔥 MAIN CONTENT -->
    <div class="main-content flex-grow-1">

        <!-- 🔥 TOPBAR -->
        <div class="topbar d-flex justify-content-between align-items-center p-3 shadow-sm">
            <h4>Dashboard</h4>
            <span class="text-muted">Admin Panel</span>
        </div>

        <div class="container mt-4">

            <!-- 🔥 STATS -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="card-box bg-blue">
                        <h6>Total Users</h6>
                        <h3 id="totalUsers">0</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box bg-green">
                        <h6>Total Experience</h6>
                        <h3 id="totalExp">0</h3>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card-box bg-orange">
                        <h6>Page</h6>
                        <h3 id="pageInfoTop">1</h3>
                    </div>
                </div>
            </div>

            <!-- 🔍 SEARCH -->
            <div class="d-flex justify-content-between mb-3">
                <input type="text" id="searchInput" class="form-control search-box" placeholder="Search by name...">
            </div>

            <!-- 📊 TABLE -->
            <div class="table-responsive shadow-sm rounded">
                <table class="table table-hover table-bordered text-center align-middle">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Degree</th>
                            <th>Stream</th>
                            <th>Experience</th>
                            <th>Skills</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
            </div>

            <!-- 📄 PAGINATION -->
            <div class="text-center mt-3">
                <button class="btn btn-outline-primary" onclick="prevPage()">Previous</button>
                <span id="pageInfo" class="mx-3 fw-bold"></span>
                <button class="btn btn-outline-primary" onclick="nextPage()">Next</button>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="JavaScript/admin.js"></script>

<script src="JavaScript/admin.js"></script>

</body>
</html>
